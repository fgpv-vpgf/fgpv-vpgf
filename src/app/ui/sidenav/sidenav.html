<md-sidenav class="site-sidenav md-sidenav-left md-whiteframe-z2" md-component-id="left">
    <header class="nav-header">
        <a class="app-logo" href="#">
            <div>
                <img ng-src="{{self.markerImageSrc || 'data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22/%3E'}}" alt="">
            </div>
            <h1 translate class="app-logotype md-heading">sidenav.title</h1>
        </a>
    </header>

    <md-button class="md-icon-button black rv-button-32 minimize-button" ng-click="self.minimize()">
        <md-icon md-svg-src="community:chevron-double-left"></md-icon>
    </md-button>

    <md-content role="navigation">
        <ul class="app-menu">
            <li class="app-menu-item" ng-repeat="section in self.menu">
                <rv-menu-link ng-if="section.type === 'link'" section="section"></rv-menu-link>

                <ul class="app-menu app-menu-sublist" ng-if="section.children">
                    <li ng-repeat="child in section.children">
                        <rv-menu-link section="child"></rv-menu-link>
                    </li>
                </ul>
            </li>
        </ul>

        <md-divider></md-divider>

        <md-content role="language">
            <span class="rv-language md-ink-rippled">{{ 'sidenav.label.language' | translate }}
                <img class="rv-language-icon" alt="language icon" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAYCAYAAAD6S912AAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAALEgAACxIB0t1+/AAAABZ0RVh0Q3JlYXRpb24gVGltZQAwOS8wNi8xMy48nZQAAAAcdEVYdFNvZnR3YXJlAEFkb2JlIEZpcmV3b3JrcyBDUzVxteM2AAACd0lEQVQ4jY2VP0/bQBjGHyKPIVgCM0QCn8Sc1JIlRnQLI8L4E3gjUoay9htEAgkmOjp7BiK+QD22k0+3VEw2HVu1cVO1SF2eDrEtY2KXR3qH851/73N/X5AESQAIAHhF+38BwARwYVnWFwAsv1cGRAAIIAVwA8BpgARCiE9CiO9XV1dPSZLQdd1FG7AaCsAFgHf9fv9+f3//22g0WsZxzKqqQAMt6vV6bzqdzvVyucTx8TGklPA8D6ZpNv9Ud9jr9WhZFk9OTnh3d0eS3NzcfOb89PSUYRhysVi8cAgAotvtvu92u3+llAzDkHXVgXW4bdu/AQiSwPb29rKabZ3agC/WPLdbSmvNyWTSCjRNk1EU0fO8l9Aq0Pd9GoZB27ZbgUEQkCTTNG0HFg4HgwEBcDabrQUqpcrxQoj1wKOjIxqGweFwyPF4zN3d3bUOHcchSUZRRJIMgmA9UGtNrTVJ0rbt0l0dOJ1OSZJSSqZpyul02j7l2WxG3/cbgVmWkSSVUkzTlFmWtQN936fWmkIIWpZFrXUJLDZDKVWCSdJxnBLYqd6a4XCIw8NDDAYDJEmC29tbPDw8lP1CCACAlBKmaeLs7KxslyocTiaTcg3rOjg4eGo6zEopzufz5imvk+u6iyaglPL5xrQB4zjm+fn5z62trR8AklddvzqwgOzt7X3t9/v3qLziABwA161w13UXSZLw8vLyz87Ozi/btj9iVQ5MtpcAB8BbAHENCr4WkoNusHo7i3AAiAp89Y5VskYAZAvQBPC5cFTvN0imlaOY5vFhY2PjEcA8T5DlLhwAXg5Vefu5GlwIrIpTlCcoCta8ujQAwvq//wD7F5sgS+yPtgAAAABJRU5ErkJggg=="></img>
            </span>
            <rv-language></rv-language>
        </md-content>

        <span flex></span>
        <p class="md-caption rv-version">
            <span class="rv-version-number">{{ self.version.major }}.{{ self.version.minor }}.{{ self.version.patch }}
                <span class="rv-version-hash">[{{ self.version.hash }}]</span></span>
            <span class="rv-version-timestamp">{{ self.version.timestamp }}</span>
        </p>

    </md-content>
</md-sidenav>
